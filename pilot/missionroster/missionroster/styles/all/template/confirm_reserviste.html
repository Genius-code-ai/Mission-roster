{% include 'overall_header.html' %}
<style>
.rm-wrap{max-width:480px;margin:60px auto;padding:0 16px;font-family:system-ui,sans-serif;text-align:center;}
.rm-card{background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.1);padding:36px;}
.rm-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:6px;font-size:.9rem;font-weight:500;border:none;cursor:pointer;text-decoration:none;transition:opacity .15s;}
.rm-btn:hover{opacity:.85;}
.rm-btn-primary{background:#3b82f6;color:#fff;}
.rm-btn-secondary{background:#e2e8f0;color:#1e293b;}
</style>
<div class="rm-wrap">
  <div class="rm-card">
    <div style="font-size:2.5rem;margin-bottom:12px;">⚠️</div>
    <h2 style="color:#ef4444;margin:0 0 12px;">Groupe complet</h2>
    <p style="color:#475569;">Le groupe <strong>{{ SLOT_NAME }}</strong> est complet
       ({{ MAX_PLACES }} places, {{ TITULAIRES }} titulaires).</p>
    <p style="color:#475569;">Souhaitez-vous vous inscrire comme <strong>Réserviste</strong> ?</p>
    <div style="display:flex;gap:12px;justify-content:center;margin-top:20px;">
      <form action="{{ U_JOIN }}" method="post">
        {{ S_FORM_TOKEN }}
        <input type="hidden" name="slot_name"  value="{{ SLOT_NAME }}" />
        <input type="hidden" name="status"     value="Reserviste" />
        <input type="hidden" name="mission_id" value="{{ MISSION_ID }}" />
        <button type="submit" class="rm-btn rm-btn-primary">✔ Oui, Réserviste</button>
      </form>
      <a href="{{ U_MISSION_VIEW }}" class="rm-btn rm-btn-secondary">✖ Annuler</a>
    </div>
  </div>
</div>
{% include 'overall_footer.html' %}
